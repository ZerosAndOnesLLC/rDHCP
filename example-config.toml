# =============================================================================
# rDHCP — Example Configuration
# =============================================================================
# Full reference for all options. Uncomment and edit sections as needed.
# Minimal required: [global], [ha], and at least one [[subnet]].

# -----------------------------------------------------------------------------
# Global server settings
# -----------------------------------------------------------------------------
[global]
log_level = "info"                # trace, debug, info, warn, error
log_format = "text"               # "text" or "json"
lease_db = "/var/lib/rdhcpd/leases"
workers = 1                       # receive workers per protocol (DHCPv4/v6)

# --- Rate Limiting & Security ---
rate_limit_burst = 10             # per-client burst size (packets)
rate_limit_pps = 5.0              # per-client sustained rate (packets/sec)
global_rate_limit_pps = 0.0       # global rate limit, 0 = disabled (packets/sec)
rogue_threshold = 50              # requests per window before rogue alert
rogue_window_secs = 60            # sliding window for rogue detection
pool_high_water = 0.9             # warn when pool utilization exceeds this (0.0-1.0)
accept_relayed = true             # accept DHCP packets forwarded by a relay agent
                                  # (giaddr != 0). Set false to disable relay support entirely.
relay_rate_limit_burst = 200      # per-relay-source burst (higher than per-MAC — relays aggregate many clients)
relay_rate_limit_pps = 100.0      # per-relay-source sustained rate (packets/sec)

# -----------------------------------------------------------------------------
# REST Management API
# -----------------------------------------------------------------------------
[api]
listen = "127.0.0.1:8080"
api_key = "change-me"             # required for non-loopback bind addresses
                                  # all /api/v1/* endpoints require X-API-Key header
                                  # /health, /healthz, and /metrics are exempt

# -----------------------------------------------------------------------------
# High Availability
# -----------------------------------------------------------------------------
[ha]
mode = "standalone"

# Active/Active — two nodes, split-scope with automatic failover:
# [ha]
# mode = "active-active"
# peer = "10.0.0.2:9000"
# listen = "0.0.0.0:9000"
# scope_split = 0.5               # fraction of pool for this node (0.0-1.0)
# mclt = 3600                     # max client lead time (seconds)
# partner_down_delay = 3600       # seconds before taking over peer's scope
# tls_cert = "/etc/rdhcpd/cert.pem"
# tls_key = "/etc/rdhcpd/key.pem"
# tls_ca = "/etc/rdhcpd/ca.pem"

# Raft — three or more nodes, consensus-based:
# [ha]
# mode = "raft"
# node_id = 1
# peers = ["10.0.0.2:9000", "10.0.0.3:9000"]
# tls_cert = "/etc/rdhcpd/cert.pem"
# tls_key = "/etc/rdhcpd/key.pem"
# tls_ca = "/etc/rdhcpd/ca.pem"

# -----------------------------------------------------------------------------
# IPv4 Subnet
# -----------------------------------------------------------------------------
[[subnet]]
network = "10.0.1.0/24"
pool_start = "10.0.1.100"
pool_end = "10.0.1.250"
lease_time = 86400                # 24 hours
max_lease_time = 172800           # cap client-requested lease time to 48h
# renewal_time = 43200            # T1 (default: 50% of lease_time)
# rebinding_time = 75600          # T2 (default: 87.5% of lease_time)
router = "10.0.1.1"
dns = ["10.0.0.53", "10.0.0.54"]
domain = "example.com"
ntp = ["10.0.1.1"]                # NTP servers (DHCP option 42); mirrors `dns`

# --- Per-Subnet Security ---
max_leases_per_mac = 1            # max active leases per MAC (0 = unlimited)
ip_probe = false                  # probe IP before offering (duplicate detection)
# ip_probe_timeout_ms = 500       # probe timeout in ms
# mac_allow = ["aa:bb:cc:dd:ee:f1", "aa:bb:cc:dd:ee:f2"]  # whitelist (empty = allow all)
# mac_deny = ["00:11:22:33:44:55"]                          # blacklist (checked first)

# --- DHCP Relay ---
# trusted_relays = ["10.0.1.2"]    # restrict relayed packets to these source IPs
                                  # empty = accept from any relay (if accept_relayed=true)

# --- Static Reservations ---
[[subnet.reservation]]
mac = "aa:bb:cc:dd:ee:f1"
ip = "10.0.1.10"
hostname = "printer"

[[subnet.reservation]]
mac = "aa:bb:cc:dd:ee:f2"
ip = "10.0.1.11"
hostname = "server"

# [[subnet.reservation]]
# client_id = "01aabbccddeef3"    # option 61 client identifier (hex)
# ip = "10.0.1.12"
# hostname = "laptop"

# --- Generic DHCP option overrides ---
# Per-subnet overrides for any DHCP option not covered by a typed field above.
# Each [[subnet.option]] entry has a `code` plus EXACTLY ONE value form:
#   ip = "1.2.3.4"                        single IPv4 (4 bytes)
#   ips = ["1.2.3.4", "5.6.7.8"]          list of IPv4 (n*4 bytes)
#   string = "..."                        ASCII string (<=255 bytes)
#   u8 = 64                               single byte
#   u16 = 1500                            big-endian u16
#   u32 = 3600                            big-endian u32
#   hex = "deadbeef"                      arbitrary bytes (<=255 bytes, even-length)
# Reserved codes (server-managed): 0, 1, 28, 51, 53, 54, 58, 59, 255.
# Codes 3/6/15/42 conflict with the typed `router`/`dns`/`domain`/`ntp` fields — set one, not both.
#
# [[subnet.option]]
# code = 66                               # TFTP server name
# string = "tftp.corp.lan"
#
# [[subnet.option]]
# code = 67                               # Bootfile name
# string = "pxelinux.0"
#
# [[subnet.option]]
# code = 252                              # WPAD URL
# string = "http://wpad.corp.lan/wpad.dat"
#
# [[subnet.option]]
# code = 23                               # IP TTL
# u8 = 64
#
# [[subnet.option]]
# code = 43                               # Vendor-specific (opaque binary)
# hex = "0108..."

# -----------------------------------------------------------------------------
# IPv6 Subnet
# -----------------------------------------------------------------------------
[[subnet]]
network = "2001:db8:1::/64"
pool_start = "2001:db8:1::1000"
pool_end = "2001:db8:1::ffff"
lease_time = 86400
preferred_time = 43200
dns = ["2001:db8::53"]
domain = "example.com"

# -----------------------------------------------------------------------------
# IPv6 Prefix Delegation
# -----------------------------------------------------------------------------
[[subnet]]
network = "2001:db8:pd::/48"
type = "prefix-delegation"
delegated_length = 56
lease_time = 604800               # 7 days

# -----------------------------------------------------------------------------
# Dynamic DNS (RFC 2136)
# -----------------------------------------------------------------------------
[ddns]
enabled = false
